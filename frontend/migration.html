<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fintech Admin | Migracion</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand-block">
        <a class="brand" href="/index.html">Fintech Admin</a>
        <span class="brand-subtitle">Migracion de archivos</span>
      </div>

      <nav class="app-nav" aria-label="Principal">
        <a data-nav="dashboard" href="/index.html">Dashboard</a>
        <a data-nav="clients" href="/clients.html">Clientes</a>
        <a data-nav="create-client" href="/client-create.html">Nuevo cliente</a>
        <a data-nav="reports" href="/reports.html">Reportes</a>
        <a data-nav="history" href="/history.html">Historial</a>
        <a data-nav="migration" href="/migration.html">Migracion</a>
      </nav>
    </header>

    <main class="page-shell page-shell--narrow">
      <section class="page-title-block">
        <h1>Migracion de datos</h1>
        <p>Sube archivos para poblar MySQL y MongoDB de forma idempotente.</p>
      </section>

      <section id="pageMessage" class="alert" hidden></section>

      <section class="panel">
        <form id="migrationForm" class="form-grid" novalidate>
          <label>
            Archivo de migracion (.xlsx, .csv, .txt, .tsv)
            <input id="migrationFile" type="file" accept=".xlsx,.csv,.txt,.tsv" required />
          </label>

          <div class="row-actions">
            <button id="btnMigrationUpload" class="btn" type="submit">Subir y migrar</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>Resultado</h2>
        <div id="migrationOutput" class="migration-result">
          <p class="result-placeholder">Aun no se ha ejecutado la migracion.</p>
        </div>
      </section>
    </main>

    <script type="module" src="/pages/migration.page.js"></script>
  </body>
</html>
