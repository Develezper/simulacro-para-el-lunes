<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fintech Admin | Clientes</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand-block">
        <a class="brand" href="/index.html">Fintech Admin</a>
        <span class="brand-subtitle">Gestion de clientes</span>
      </div>

      <nav class="app-nav" aria-label="Principal">
        <a data-nav="dashboard" href="/index.html">Dashboard</a>
        <a data-nav="clients" href="/clients.html">Clientes</a>
        <a data-nav="create-client" href="/client-create.html">Nuevo cliente</a>
        <a data-nav="reports" href="/reports.html">Reportes</a>
        <a data-nav="history" href="/history.html">Historial</a>
        <a data-nav="migration" href="/migration.html">Migracion</a>
      </nav>

      <form id="apiConfigForm" class="api-config">
        <label for="apiBaseInput">Base URL API</label>
        <div class="api-config-controls">
          <input id="apiBaseInput" type="text" placeholder="http://127.0.0.1:3000/api" />
          <button type="submit" class="btn btn--secondary">Guardar</button>
          <button id="apiResetBtn" type="button" class="btn btn--ghost">Reset</button>
        </div>
        <small id="apiConfigFeedback" class="api-config-feedback"></small>
      </form>
    </header>

    <main class="page-shell">
      <section class="page-title-block page-title-block--row">
        <div>
          <h1>Clientes</h1>
          <p>Listado completo con acciones CRUD.</p>
        </div>
        <div class="row-actions">
          <a href="/client-create.html" class="btn">Nuevo cliente</a>
          <button id="btnRefreshClients" class="btn btn--secondary" type="button">Recargar</button>
        </div>
      </section>

      <section id="pageMessage" class="alert" hidden></section>

      <section class="panel">
        <label for="searchClient">Busqueda local</label>
        <input
          id="searchClient"
          type="text"
          placeholder="Filtrar por id, identificacion, nombre o email"
          autocomplete="off"
        />
      </section>

      <section class="panel">
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Identificacion</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Telefono</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="clientsTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>Detalle de cliente</h2>
        <pre id="clientDetailOutput" class="json-output">Selecciona "Ver" en una fila para mostrar datos.</pre>
      </section>
    </main>

    <script type="module" src="/pages/clients.page.js"></script>
  </body>
</html>
