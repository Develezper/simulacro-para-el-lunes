<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fintech Admin | Nuevo cliente</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand-block">
        <a class="brand" href="/index.html">Fintech Admin</a>
        <span class="brand-subtitle">Alta de clientes</span>
      </div>

      <nav class="app-nav" aria-label="Principal">
        <a data-nav="dashboard" href="/index.html">Dashboard</a>
        <a data-nav="clients" href="/clients.html">Clientes</a>
        <a data-nav="create-client" href="/client-create.html">Nuevo cliente</a>
        <a data-nav="reports" href="/reports.html">Reportes</a>
        <a data-nav="history" href="/history.html">Historial</a>
        <a data-nav="migration" href="/migration.html">Migracion</a>
      </nav>

      <form id="apiConfigForm" class="api-config">
        <label for="apiBaseInput">Base URL API</label>
        <div class="api-config-controls">
          <input id="apiBaseInput" type="text" placeholder="http://127.0.0.1:3000/api" />
          <button type="submit" class="btn btn--secondary">Guardar</button>
          <button id="apiResetBtn" type="button" class="btn btn--ghost">Reset</button>
        </div>
        <small id="apiConfigFeedback" class="api-config-feedback"></small>
      </form>
    </header>

    <main class="page-shell page-shell--narrow">
      <section class="page-title-block page-title-block--row">
        <div>
          <h1>Nuevo cliente</h1>
          <p>Completa todos los campos para registrar un cliente.</p>
        </div>
        <a href="/clients.html" class="btn btn--ghost">Volver al listado</a>
      </section>

      <section id="pageMessage" class="alert" hidden></section>

      <section class="panel">
        <form id="createClientForm" class="form-grid" novalidate>
          <label>
            Identificacion
            <input name="identification" type="text" minlength="4" maxlength="32" required />
          </label>

          <label>
            Nombre completo
            <input name="full_name" type="text" minlength="3" maxlength="150" required />
          </label>

          <label>
            Email
            <input name="email" type="email" maxlength="180" required />
          </label>

          <label>
            Telefono
            <input name="phone" type="text" minlength="7" maxlength="40" required />
          </label>

          <label>
            Direccion
            <input name="address" type="text" minlength="5" maxlength="255" required />
          </label>

          <div class="row-actions">
            <button id="btnCreateClient" class="btn" type="submit">Crear cliente</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="/pages/client-create.page.js"></script>
  </body>
</html>
