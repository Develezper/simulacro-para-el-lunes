<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fintech Admin | Historial</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand-block">
        <a class="brand" href="/index.html">Fintech Admin</a>
        <span class="brand-subtitle">Historial documental por email</span>
      </div>

      <nav class="app-nav" aria-label="Principal">
        <a data-nav="dashboard" href="/index.html">Dashboard</a>
        <a data-nav="clients" href="/clients.html">Clientes</a>
        <a data-nav="create-client" href="/client-create.html">Nuevo cliente</a>
        <a data-nav="reports" href="/reports.html">Reportes</a>
        <a data-nav="history" href="/history.html">Historial</a>
        <a data-nav="migration" href="/migration.html">Migracion</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-title-block">
        <h1>Historial del cliente</h1>
        <p>Consulta historial consolidado en MongoDB por email.</p>
      </section>

      <section id="pageMessage" class="alert" hidden></section>

      <section class="panel">
        <form id="historyForm" class="inline-form">
          <input id="historyEmail" type="email" placeholder="cliente@mail.com" required />
          <button class="btn" type="submit">Buscar historial</button>
        </form>
      </section>

      <section class="panel">
        <h2>Metadatos</h2>
        <pre id="historyMeta" class="json-output">Aun no se ha consultado ningun cliente.</pre>
      </section>

      <section class="panel">
        <h2>Transacciones</h2>
        <div id="historyTransactionsTable"></div>
      </section>
    </main>

    <script type="module" src="/pages/history.page.js"></script>
  </body>
</html>
