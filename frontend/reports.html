<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fintech Admin | Reportes</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand-block">
        <a class="brand" href="/index.html">Fintech Admin</a>
        <span class="brand-subtitle">Reporteria SQL</span>
      </div>

      <nav class="app-nav" aria-label="Principal">
        <a data-nav="dashboard" href="/index.html">Dashboard</a>
        <a data-nav="clients" href="/clients.html">Clientes</a>
        <a data-nav="create-client" href="/client-create.html">Nuevo cliente</a>
        <a data-nav="reports" href="/reports.html">Reportes</a>
        <a data-nav="history" href="/history.html">Historial</a>
        <a data-nav="migration" href="/migration.html">Migracion</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-title-block">
        <h1>Reportes</h1>
        <p>Consultas consolidadas para analisis operativo.</p>
      </section>

      <section id="pageMessage" class="alert" hidden></section>

      <section class="panel">
        <div class="panel-header">
          <h2>Total pagado por cliente</h2>
          <button id="btnLoadTotalPaid" class="btn" type="button">Cargar reporte</button>
        </div>
        <div id="totalPaidTable"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Facturas pendientes</h2>
          <button id="btnLoadPendingInvoices" class="btn" type="button">Cargar reporte</button>
        </div>
        <div id="pendingInvoicesTable"></div>
      </section>

      <section class="panel">
        <div class="panel-header panel-header--stacked">
          <h2>Transacciones por plataforma</h2>
          <div class="inline-form">
            <input id="platformInput" type="text" placeholder="Ejemplo: Nequi" value="Nequi" />
            <button id="btnLoadByPlatform" class="btn" type="button">Consultar</button>
          </div>
        </div>
        <div id="transactionsByPlatformTable"></div>
      </section>
    </main>

    <script type="module" src="/pages/reports.page.js"></script>
  </body>
</html>
